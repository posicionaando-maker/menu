<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0D0D0D">
    <meta name="description" content="Menú digital del restaurante - Funciona offline">
    
    <!-- Título que aparece en la pestaña del navegador -->
    <title>Menú Digital · Restaurante Cuba</title>
    
    <!-- Link a la hoja de estilos (CSS) -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Iconos para la PWA (diferentes tamaños para distintos dispositivos) -->
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="manifest" href="manifest.json">
    
    <!-- Color de la barra de estado en móviles (Android) -->
    <meta name="theme-color" content="#0D0D0D">
</head>
<body>
    <!-- Contenedor principal de toda la app -->
    <div class="app-container">
        
        <!-- Encabezado con el nombre del restaurante -->
        <header class="header">
            <h1>🍽️ El Sabor de Cuba</h1>
            <p class="subtitle">Menú digital · Siempre actualizado</p>
            <!-- Fecha de la última actualización del menú (se llena con JavaScript) -->
            <div class="last-update" id="lastUpdate">Cargando...</div>
        </header>

        <!-- Tabs (pestañas) para filtrar por categoría -->
        <div class="tabs" id="tabs">
            <!-- Los botones se generan dinámicamente con JavaScript -->
            <button class="tab-btn active" data-categoria="todos">📋 Todos</button>
        </div>

        <!-- Grid (cuadrícula) donde se muestran los platos -->
        <div class="menu-grid" id="menuGrid">
            <!-- Aquí JavaScript inyectará las tarjetas de platos -->
            <div class="loading-spinner">Cargando menú...</div>
        </div>

        <!-- Botón flotante para actualizar manualmente -->
        <button class="btn-actualizar" id="btnActualizar" title="Actualizar menú desde Google Drive">
            🔄
        </button>
        
        <!-- Notificación flotante (snackbar) para mostrar mensajes al usuario -->
        <div id="snackbar" class="snackbar">Mensaje</div>
    </div>

    <!-- Scripts: primero la base de datos, luego la lógica principal -->
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
    
    <!-- Registrar el Service Worker (para offline) -->
    <script>
        // Verifica si el navegador soporta Service Workers
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Registra el archivo sw.js que está en la raíz
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('✅ Service Worker registrado:', reg))
                    .catch(err => console.error('❌ Error al registrar SW:', err));
            });
        }
    </script>
</body>
</html>
